<mat-toolbar class="main-toolbar">
  <div class="logo-container" [routerLink]="['/']">
    <img src="assets/images/logo.png" class="olympic-logo" alt="IOD Sports" loading="eager" decoding="async"
      fetchpriority="high" width="50" height="50">
    <div class="brand-text">
      <span class="iod">IOD</span>
      <span class="sports">SPORTS</span>
    </div>
  </div>

  <div class="spacer"></div>

  <nav class="desktop-nav hidden-mobile">
    <a class="nav-link home-link" [routerLink]="['/']" [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="active-link">
      <mat-icon class="nav-icon" aria-hidden="true">home</mat-icon>
      <span class="nav-label">Home</span>
    </a>
    <a class="nav-link" [routerLink]="['/sports']" routerLinkActive="active-link">
      <img class="nav-icon nav-icon-pictogram" src="assets/images/pictograms/icons/wrestling.svg" alt="Sports">
      <span class="nav-label">Sports</span>
    </a>
    <a class="nav-link" [routerLink]="['/athletes']" routerLinkActive="active-link">
      <img class="nav-icon nav-icon-pictogram" src="assets/images/pictograms/icons/athletics.svg" alt="Athletes">
      <span class="nav-label">Athletes</span>
    </a>
    <a class="nav-link" [routerLink]="['/originals']" routerLinkActive="active-link">
      <mat-icon class="nav-icon" aria-hidden="true">podcasts</mat-icon>
      <span class="nav-label">Originals</span>
    </a>
  </nav>
</mat-toolbar>

<!-- Main Content (No Sidenav) -->
<div class="main-content" (scroll)="onContentScroll($event)">


  <div [@routeAnimations]="prepareRoute(outlet)" class="router-outlet-container">
    <router-outlet #outlet="outlet"></router-outlet>
  </div>

  <!-- Global Footer -->
  <app-footer></app-footer>
</div>

<!-- Mobile Bottom Nav -->
<app-bottom-nav class="visible-mobile"></app-bottom-nav>
