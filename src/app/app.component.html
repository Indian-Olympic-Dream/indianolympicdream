<mat-toolbar class="main-toolbar">
  <!-- Left: Logo & Branding -->
  <div class="logo-container" [routerLink]="['/']">
    <img src="assets/images/logo.png" class="olympic-logo" alt="IOD Sports" loading="eager" decoding="async"
      fetchpriority="high" width="50" height="50">
    <div class="logo-text">
      <span class="iod">IOD</span>
      <span class="sports">SPORTS</span>
    </div>
  </div>

  <!-- Center: Desktop Navigation (Absolute Positioned) -->
  <nav class="nav-links hidden-mobile">
    <button class="nav-button" [routerLink]="['/athletes']" mat-button routerLinkActive="active-link">
      <mat-icon>sports_kabaddi</mat-icon>
      Athletes
    </button>
    <button class="nav-button" [routerLink]="['/calendar']" mat-button routerLinkActive="active-link">
      <mat-icon>event_note</mat-icon>
      Calendar
    </button>
    <button class="nav-button" [routerLink]="['/videos']" mat-button routerLinkActive="active-link">
      <mat-icon>smart_display</mat-icon>
      Videos
    </button>
    <button class="nav-button" [routerLink]="['/originals']" mat-button routerLinkActive="active-link">
      <mat-icon>auto_awesome</mat-icon>
      IOD Originals
    </button>
    <button class="nav-button" [routerLink]="['/store']" mat-button routerLinkActive="active-link">
      <mat-icon>storefront</mat-icon>
      Store
    </button>
  </nav>

  <!-- Spacer to push Right section -->
  <span class="fill-remaining-space"></span>

  <!-- Right: Auth Actions -->
  <div class="auth-actions">
    <button mat-icon-button *ngIf="!authService.isAuthenticated()" [routerLink]="['/auth']" class="auth-btn">
      <mat-icon>login</mat-icon>
    </button>
    <button mat-icon-button *ngIf="authService.isAuthenticated()" (click)="logout()" class="auth-btn">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</mat-toolbar>

<!-- Main Content (No Sidenav) -->
<div class="main-content" (scroll)="onContentScroll($event)">
  <div [@routeAnimations]="prepareRoute(outlet)" class="router-outlet-container">
    <router-outlet #outlet="outlet"></router-outlet>
  </div>

  <!-- Global Footer -->
  <app-footer></app-footer>
</div>

<!-- Mobile Bottom Nav -->
<app-bottom-nav class="visible-mobile"></app-bottom-nav>
