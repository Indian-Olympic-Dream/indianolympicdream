<mat-toolbar class="main-toolbar">
  <a class="logo-container" [routerLink]="['/']" routerLinkActive="active-home"
    [routerLinkActiveOptions]="{ exact: true }" aria-label="Go to Home">
    <img src="assets/images/logo.png" class="olympic-logo" alt="IOD Sports" loading="eager" decoding="async"
      fetchpriority="high" width="50" height="50">
    <div class="brand-text">
      <span class="iod">IOD</span>
      <span class="sports">SPORTS</span>
    </div>
  </a>

  <nav class="desktop-nav hidden-mobile">
    <a class="nav-link" [routerLink]="['/history']" routerLinkActive="active-link">
      <img class="nav-icon nav-icon-premium" src="assets/icons/legacy.svg" alt="" aria-hidden="true">
      <span class="nav-label">Legacy</span>
    </a>
    <a class="nav-link" [routerLink]="['/athletes']" routerLinkActive="active-link">
      <img class="nav-icon nav-icon-pictogram" src="assets/icons/athletes.svg" alt="Athletes">
      <span class="nav-label">Athletes</span>
    </a>
    <a class="nav-link" [routerLink]="['/calendar']" routerLinkActive="active-link">
      <img class="nav-icon nav-icon-premium nav-icon-premium-calendar" src="assets/icons/calendar.svg" alt=""
        aria-hidden="true">
      <span class="nav-label">Calendar</span>
    </a>
    <a class="nav-link" [routerLink]="['/originals']" routerLinkActive="active-link">
      <img class="nav-icon nav-icon-premium" src="assets/icons/originals.svg" alt="" aria-hidden="true">
      <span class="nav-label">IOD Originals</span>
    </a>
  </nav>
</mat-toolbar>

<!-- Main Content (No Sidenav) -->
<div class="main-content" (scroll)="onContentScroll($event)">


  <div [@routeAnimations]="prepareRoute(outlet)" class="router-outlet-container">
    <router-outlet #outlet="outlet"></router-outlet>
  </div>

  <!-- Global Footer -->
  <app-footer></app-footer>
</div>

<!-- Mobile Bottom Nav -->
<app-bottom-nav class="visible-mobile"></app-bottom-nav>
