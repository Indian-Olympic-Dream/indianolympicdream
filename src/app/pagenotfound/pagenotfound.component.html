<section class="error-shell">
  <article class="error-panel">
    <div class="error-photo-wrap">
      <img src="assets/images/404.jpg" alt="Frustrated Indian fan reacting to the match" class="error-photo" />
      <div class="error-topline">
        <span class="error-kicker">Page Not Found</span>
        <span class="error-code">404</span>
      </div>
    </div>

    <div class="error-content">
      <div class="error-copy">
        <h1 class="error-title">You absolutely bottled it.</h1>
        <p class="error-description">
          Wrong route, missing page, full on frustration. Let’s all pretend this never happened and go back home.
        </p>
      </div>

      <div class="error-actions">
        <a mat-flat-button color="primary" routerLink="/" class="error-cta error-cta-primary">Go Home</a>
      </div>
    </div>
  </article>
</section>
