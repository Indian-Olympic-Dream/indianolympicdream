<div class="store-container">
    <header class="store-header">
        <h1>IOD <span class="accent">STORE</span></h1>
        <p class="subtitle">Bring Home the Glory. Official IOD Infographics & Memorabilia.</p>
    </header>

    <div class="products-grid" *ngIf="products$ | async as products; else loading">
        <div class="product-card" *ngFor="let product of products">
            <div class="image-container">
                <img [src]="getOptimizedImageUrl(product)" [alt]="product.title">
                <div class="badge" [class.merch]="product.type === 'merch'">{{ product.type.toUpperCase() }}</div>
            </div>
            <div class="card-content">
                <h3 class="product-title">{{ product.title }}</h3>

                <div class="product-meta">
                    <span class="price">₹{{ product.basePrice }}</span>
                    <!-- <span class="variants-count" *ngIf="product.variants?.length">+{{ product.variants.length }} Options</span> -->
                </div>
            </div>
        </div>
    </div>

    <ng-template #loading>
        <div class="loading-state">
            <p>Loading Collection...</p>
        </div>
    </ng-template>

    <!-- Empty State if specific filtering returns 0 (future proof) -->
    <div class="empty-state" *ngIf="(products$ | async)?.length === 0">
        <mat-icon>storefront</mat-icon>
        <p>The collection is being curated. Check back soon!</p>
    </div>
</div>
